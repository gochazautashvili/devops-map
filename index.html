<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevOps Roadmap — სრული გზამკვლევი</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0B0E14;
    --bg-surface: #11151C;
    --bg-raised: #1A1F2B;
    --bg-hover: #222838;
    --border: #1E2433;
    --border-light: #2A3145;
    --text-primary: #D4DBE8;
    --text-secondary: #7A8599;
    --text-muted: #4E5669;
    --accent-blue: #4DA0FF;
    --accent-green: #41D98C;
    --accent-orange: #FF9254;
    --accent-purple: #B07EFF;
    --accent-red: #FF6B81;
    --accent-cyan: #36D6D6;
    --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    --font-sans: 'IBM Plex Sans', -apple-system, sans-serif;
    --ease: cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: var(--font-mono);
    background: var(--bg-deep);
    color: var(--text-primary);
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ─── Header ─── */
  .header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #0F1219 0%, var(--bg-deep) 100%);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    gap: 16px;
  }

  .header h1 {
    font-family: var(--font-sans);
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .header h1 .g1 { color: var(--accent-blue); }
  .header h1 .g2 { color: var(--accent-green); }
  .header h1 .g3 { color: var(--accent-orange); }

  .header-sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .progress-label {
    font-size: 10px;
    color: var(--text-secondary);
  }

  .progress-bar {
    width: 130px;
    height: 5px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-blue), var(--accent-green));
    border-radius: 3px;
    transition: width 0.5s var(--ease);
  }

  .progress-pct {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent-blue);
    min-width: 30px;
    text-align: right;
  }

  /* ─── Layout ─── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ─── Sidebar ─── */
  .sidebar {
    width: 270px;
    min-width: 270px;
    border-right: 1px solid var(--border);
    background: var(--bg-deep);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }

  .phase-item {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.2s var(--ease);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .phase-item:hover { background: var(--bg-surface); }
  .phase-item.active {
    background: var(--bg-surface);
    border-left-color: var(--accent-blue);
  }

  .phase-icon { font-size: 20px; flex-shrink: 0; }

  .phase-info { flex: 1; min-width: 0; }

  .phase-name {
    font-family: var(--font-sans);
    font-size: 12px;
    font-weight: 600;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .phase-dur {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .phase-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 8px;
    flex-shrink: 0;
  }

  /* ─── Skill Tracker ─── */
  .tracker {
    padding: 16px;
    border-top: 1px solid var(--border-light);
  }

  .tracker-title {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 12px;
  }

  .tracker-phase-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--accent-blue);
    margin-bottom: 4px;
    margin-top: 10px;
  }
  .tracker-phase-label:first-of-type { margin-top: 0; }

  .tracker-skill {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 2px 0;
    cursor: pointer;
    font-size: 11px;
  }

  .tracker-skill input[type="checkbox"] {
    accent-color: var(--accent-green);
    width: 13px;
    height: 13px;
    cursor: pointer;
  }

  .tracker-skill span {
    color: var(--text-secondary);
    transition: all 0.2s;
  }

  .tracker-skill.done span {
    color: var(--accent-green);
    text-decoration: line-through;
  }

  /* ─── Main ─── */
  .main {
    flex: 1;
    overflow-y: auto;
  }

  .main::-webkit-scrollbar { width: 6px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }

  /* ─── Welcome ─── */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    text-align: center;
    min-height: 100%;
    animation: fadeIn 0.5s var(--ease);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .welcome-icon { font-size: 56px; margin-bottom: 16px; }

  .welcome h2 {
    font-family: var(--font-sans);
    font-size: 22px;
    font-weight: 700;
    color: #F0F4FC;
    margin-bottom: 12px;
  }

  .welcome p {
    color: var(--text-secondary);
    font-size: 13px;
    max-width: 480px;
    line-height: 1.8;
  }

  .welcome-grid {
    display: flex;
    gap: 14px;
    margin-top: 32px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .welcome-card {
    padding: 18px 22px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    text-align: center;
    min-width: 105px;
    transition: all 0.25s var(--ease);
  }

  .welcome-card:hover {
    border-color: var(--accent-blue);
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(77, 160, 255, 0.08);
  }

  .welcome-card .wc-icon { font-size: 28px; }
  .welcome-card .wc-name { font-size: 11px; color: var(--text-primary); margin-top: 8px; font-weight: 500; }
  .welcome-card .wc-dur { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

  /* ─── Phase View ─── */
  .phase-header {
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-surface);
    animation: fadeIn 0.3s var(--ease);
  }

  .phase-header-top {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .phase-header-top .ph-icon { font-size: 30px; }

  .phase-header-top h2 {
    font-family: var(--font-sans);
    font-size: 18px;
    font-weight: 700;
    color: #F0F4FC;
  }

  .phase-header-top p {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 4px;
  }

  .topic-tabs {
    display: flex;
    gap: 8px;
    margin-top: 18px;
    flex-wrap: wrap;
  }

  .topic-tab {
    padding: 6px 16px;
    border: 1px solid var(--border-light);
    border-radius: 20px;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    font-family: var(--font-sans);
    transition: all 0.2s var(--ease);
  }

  .topic-tab:hover { border-color: var(--text-secondary); color: var(--text-primary); }

  .topic-tab.active {
    border-color: var(--accent-blue);
    background: rgba(77, 160, 255, 0.1);
    color: var(--accent-blue);
  }

  .topic-prompt {
    padding: 40px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
  }

  /* ─── Content Area ─── */
  .content-area {
    padding: 20px 28px;
    animation: fadeIn 0.3s var(--ease);
  }

  .detail-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }

  .detail-tab {
    padding: 8px 16px;
    border: 1px solid var(--border-light);
    border-radius: 6px;
    background: var(--bg-deep);
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 11px;
    font-family: var(--font-mono);
    transition: all 0.2s var(--ease);
  }

  .detail-tab:hover { background: var(--bg-raised); color: var(--text-primary); }

  .detail-tab.active {
    background: var(--bg-raised);
    color: #F0F4FC;
    border-color: var(--border-light);
  }

  /* ─── Terminal Block ─── */
  .terminal {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    animation: fadeIn 0.3s var(--ease);
  }

  .terminal-bar {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg-raised);
  }

  .terminal-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }
  .terminal-dot.r { background: var(--accent-red); }
  .terminal-dot.y { background: var(--accent-orange); }
  .terminal-dot.g { background: var(--accent-green); }

  .terminal-title {
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--font-sans);
    margin-left: 8px;
  }

  .terminal pre {
    padding: 22px;
    margin: 0;
    font-size: 12px;
    line-height: 1.75;
    overflow-x: auto;
    color: var(--text-primary);
    white-space: pre-wrap;
    word-break: break-word;
    font-family: var(--font-mono);
  }

  /* ─── Responsive ─── */
  @media (max-width: 768px) {
    .sidebar { width: 220px; min-width: 220px; }
    .phase-header { padding: 16px 18px; }
    .content-area { padding: 16px 18px; }
  }

  @media (max-width: 600px) {
    .layout { flex-direction: column; }
    .sidebar {
      width: 100%;
      min-width: 100%;
      max-height: 200px;
      border-right: none;
      border-bottom: 1px solid var(--border);
    }
    .tracker { display: none; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <div class="header">
    <div>
      <h1><span class="g1">Dev</span><span class="g2">Ops</span> <span class="g3">Roadmap</span></h1>
      <div class="header-sub">Junior → Senior | სრული გზამკვლევი</div>
    </div>
    <div class="progress-wrap">
      <span class="progress-label" id="progressCount">0/20 skills</span>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <span class="progress-pct" id="progressPct">0%</span>
    </div>
  </div>

  <div class="layout">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar"></div>

    <!-- Main -->
    <div class="main" id="main"></div>
  </div>
</div>

<script>
// ─── DATA ───
const phases = [
  {
    id: 1, title: "Bare Metal & Linux", duration: "1-2 კვირა", icon: "⌨️",
    description: "სანამ ავტომატიზაციაზე გადახვალ, უნდა იცოდე რას აავტომატებ.",
    topics: [
      { name: "Terminal Mastery", details: [
        { title: "ფაილური სისტემა", content: `Linux-ის ფაილური სისტემა ხისებრი სტრუქტურაა. ყველაფერი იწყება / (root) დირექტორიიდან.

მთავარი დირექტორიები:
/home — მომხმარებლების პირადი ფაილები
/etc — კონფიგურაციის ფაილები (nginx.conf, ssh/sshd_config)
/var — ლოგები, ქეშები, ცვალებადი მონაცემები
/tmp — დროებითი ფაილები
/opt — მესამე მხარის პროგრამები

ძირითადი ბრძანებები:
  ls -la          # ყველა ფაილი + პერმისიები
  cd /var/log     # გადასვლა
  pwd             # სად ვარ ახლა
  mkdir -p a/b/c  # nested დირექტორიების შექმნა
  cp -r dir1 dir2 # რეკურსიული კოპირება
  mv old new      # გადარქმევა/გადატანა
  rm -rf dir      # ⚠️ ფრთხილად! რეკურსიული წაშლა` },
        { title: "პერმისიები (chmod, chown)", content: `ყოველ ფაილს აქვს 3 კატეგორია: Owner, Group, Others
თითოეულს — Read(4), Write(2), Execute(1)

chmod 755 script.sh
  Owner: rwx (7) — სრული წვდომა
  Group: r-x (5) — კითხვა + გაშვება
  Others: r-x (5) — კითხვა + გაშვება

chmod 644 config.yml
  Owner: rw- (6) — კითხვა + ჩაწერა
  Group: r-- (4) — მხოლოდ კითხვა
  Others: r-- (4) — მხოლოდ კითხვა

chown user:group file.txt  # მფლობელის შეცვლა
chown -R www-data:www-data /var/www  # რეკურსიული

პრაქტიკული მაგალითი:
  # Node.js აპისთვის
  sudo chown -R deploy:deploy /opt/myapp
  chmod 750 /opt/myapp
  chmod 640 /opt/myapp/.env  # .env მხოლოდ owner-მა წაიკითხოს` },
        { title: "grep / find / awk", content: `grep — ტექსტის ძებნა ფაილებში:
  grep "error" /var/log/syslog           # "error" ძებნა
  grep -r "TODO" ./src                    # რეკურსიული ძებნა
  grep -i "warning" app.log               # case-insensitive
  grep -c "500" access.log                # რამდენჯერ?
  grep -A 3 "Exception" error.log         # + 3 ხაზი შემდეგ

find — ფაილების ძებნა:
  find / -name "*.log" -mtime -7          # ლოგები ბოლო 7 დღის
  find /tmp -size +100M -delete           # 100MB+ ფაილების წაშლა
  find . -name "node_modules" -type d     # ყველა node_modules

awk — ტექსტის დამუშავება:
  awk '{print $1}' access.log             # პირველი სვეტი (IP)
  awk '/ERROR/ {count++} END {print count}' app.log
  df -h | awk '$5 > 80 {print $1, $5}'   # 80%+ დისკები

პრაქტიკული კომბინაცია:
  # ტოპ 10 IP მისამართი access.log-დან
  awk '{print $1}' access.log | sort | uniq -c | sort -rn | head -10` }
      ]},
      { name: "Systemd", details: [
        { title: "სერვისის შექმნა", content: `Systemd — Linux-ის init სისტემაა. ის მართავს სერვისებს (daemons).

შექმენი ფაილი: /etc/systemd/system/myapp.service

[Unit]
Description=My Node.js Application
After=network.target

[Service]
Type=simple
User=deploy
WorkingDirectory=/opt/myapp
ExecStart=/usr/bin/node server.js
Restart=on-failure
RestartSec=10
StandardOutput=syslog
StandardError=syslog
SyslogIdentifier=myapp
Environment=NODE_ENV=production
Environment=PORT=3000

[Install]
WantedBy=multi-user.target` },
        { title: "Systemctl ბრძანებები", content: `სერვისის მართვა:
  sudo systemctl start myapp      # გაშვება
  sudo systemctl stop myapp       # გაჩერება
  sudo systemctl restart myapp    # გადატვირთვა
  sudo systemctl status myapp     # სტატუსი
  sudo systemctl enable myapp     # ავტო-გაშვება boot-ზე
  sudo systemctl disable myapp    # ავტო-გაშვების გათიშვა

ლოგების ნახვა:
  journalctl -u myapp             # ყველა ლოგი
  journalctl -u myapp -f          # real-time (tail)
  journalctl -u myapp --since "1 hour ago"
  journalctl -u myapp --no-pager -n 50

.NET აპისთვის მაგალითი:
[Service]
ExecStart=/usr/bin/dotnet /opt/myapi/MyApi.dll
Environment=ASPNETCORE_ENVIRONMENT=Production
Environment=ASPNETCORE_URLS=http://localhost:5000` }
      ]},
      { name: "SSH & Security", details: [
        { title: "SSH Keys", content: `პაროლით შესვლა სახიფათოა. SSH key გაცილებით უსაფრთხოა.

ლოკალურ მანქანაზე:
  ssh-keygen -t ed25519 -C "your@email.com"
  # შეინახე: ~/.ssh/id_ed25519 (private) და .pub (public)

გადაგზავნე სერვერზე:
  ssh-copy-id -i ~/.ssh/id_ed25519.pub user@server-ip
  # ან ხელით:
  cat ~/.ssh/id_ed25519.pub | ssh user@server \\
    "mkdir -p ~/.ssh && cat >> ~/.ssh/authorized_keys"

სერვერზე გამორთე პაროლით შესვლა:
  sudo nano /etc/ssh/sshd_config
  
  PasswordAuthentication no
  PubkeyAuthentication yes
  PermitRootLogin no
  
  sudo systemctl restart sshd` },
        { title: "Firewall (UFW)", content: `UFW — Uncomplicated Firewall. მარტივი ინტერფეისი iptables-ისთვის.

  sudo ufw default deny incoming    # ყველაფერი დაბლოკილია
  sudo ufw default allow outgoing   # გამავალი — ნებადართული
  
  sudo ufw allow 22/tcp             # SSH (ან შეცვლილი პორტი)
  sudo ufw allow 80/tcp             # HTTP
  sudo ufw allow 443/tcp            # HTTPS
  sudo ufw allow from 10.0.0.0/8    # შიდა ქსელი
  
  sudo ufw enable                   # ჩართვა
  sudo ufw status verbose           # სტატუსი

პორტის შეცვლა (SSH):
  # /etc/ssh/sshd_config
  Port 2222  # არა 22
  
  sudo ufw allow 2222/tcp
  sudo ufw delete allow 22/tcp
  sudo systemctl restart sshd
  
  # შესვლა: ssh -p 2222 user@server` }
      ]},
      { name: "Networking & DNS", details: [
        { title: "DNS ჩანაწერები", content: `DNS — Domain Name System. დომენს IP მისამართს უკავშირებს.

A Record — დომენი → IPv4
  example.com → 164.92.123.45
  api.example.com → 164.92.123.45

CNAME — Alias (ერთი დომენი → მეორე)
  www.example.com → example.com
  blog.example.com → myblog.netlify.app

MX Record — ელ-ფოსტის სერვერი
  example.com → mail.example.com (priority: 10)

TXT Record — ვერიფიკაცია, SPF, DKIM
  example.com → "v=spf1 include:_spf.google.com ~all"

TTL (Time To Live) — ქეშირების დრო

# Gzip კომპრესია

gzip_vary on;

    text/plain text/css text/xml
    application/json application/javascript
    application/xml+rss text/javascript
    image/svg+xml;

# Static files caching
location ~* \\.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    access_log off;

# Security headers

add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin";

# Rate limiting
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
location /api/ {
    limit_req zone=api burst=20 nodelay;
    proxy_pass http://localhost:3000/;
}

# Connection tuning
worker_processes auto;
worker_connections 1024;
keepalive_timeout 65;
client_max_body_size 10M;` }

COPY --from=builder /app/dist ./dist

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: myapp
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: \${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d myapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass \${REDIS_PASSWORD}
    volumes:
      - redisdata:/data

  # Backend API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://admin:\${DB_PASSWORD}@postgres:5432/myapp
      REDIS_URL: redis://:\${REDIS_PASSWORD}@redis:6379
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:

    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - promdata:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'

  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
    volumes:
      - grafanadata:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: \${GRAFANA_PASSWORD}

  node-exporter:
    image: prom/node-exporter
    ports:
      - "9100:9100"
    command:
      - '--path.rootfs=/host'
    volumes:
      - '/:/host:ro'

volumes:
  promdata:
  grafanadata:

prometheus.yml:
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
  
  - job_name: 'myapp'
    static_configs:
      - targets: ['api:3000']
    metrics_path: '/metrics'

const skillMap = [
  { phase: 1, skills: ["Linux CLI", "Systemd", "SSH", "Networking"] },
  { phase: 2, skills: ["Nginx", "SSL/TLS", "Performance"] },
  { phase: 3, skills: ["Dockerfile", "Compose", "Volumes"] },
  { phase: 4, skills: ["GitHub Actions", "CD", "Ansible"] },
  { phase: 5, skills: ["Terraform", "Prometheus", "Grafana"] },
  { phase: 6, skills: ["K8s", "Helm", "DevSecOps"] },
];

const totalSkills = skillMap.reduce((a, p) => a + p.skills.length, 0);

// ─── STATE ───
let state = {
  activePhase: null,
  activeTopic: null,
  activeDetail: null,
  completed: new Set()
};

// ─── RENDER ───
function updateProgress() {
  const n = state.completed.size;
  const pct = Math.round((n / totalSkills) * 100);
  document.getElementById('progressCount').textContent = `${n}/${totalSkills} skills`;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
}

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  let html = '';

  phases.forEach((p, i) => {
    const sk = skillMap[i].skills;
    const done = sk.filter(s => state.completed.has(s)).length;
    const isActive = state.activePhase === i;
    const badgeColor = done === sk.length ? 'var(--accent-green)' : 'var(--text-muted)';

    html += `<div class="phase-item ${isActive ? 'active' : ''}" onclick="selectPhase(${i})"
      ${isActive ? `style="border-left-color:${['var(--accent-green)','var(--accent-blue)','var(--accent-cyan)','var(--accent-orange)','var(--accent-purple)','var(--accent-red)'][i]}"` : ''}>
      <span class="phase-icon">${p.icon}</span>
      <div class="phase-info">
        <div class="phase-name">ფაზა ${p.id}: ${p.title}</div>
        <div class="phase-dur">${p.duration}</div>
      </div>
      <span class="phase-badge" style="color:${badgeColor}">${done}/${sk.length}</span>
    </div>`;
  });

  // Skill Tracker
  html += '<div class="tracker"><div class="tracker-title">Skill Tracker</div>';
  skillMap.forEach((sm) => {
    html += `<div class="tracker-phase-label">ფაზა ${sm.phase}</div>`;
    sm.skills.forEach(skill => {
      const done = state.completed.has(skill);
      html += `<label class="tracker-skill ${done ? 'done' : ''}">
        <input type="checkbox" ${done ? 'checked' : ''} onchange="toggleSkill('${skill}')">
        <span>${skill}</span>
      </label>`;
    });
  });
  html += '</div>';

  sb.innerHTML = html;
}

function renderMain() {
  const main = document.getElementById('main');

  if (state.activePhase === null) {
    let cards = phases.map((p, i) =>
      `<div class="welcome-card" onclick="selectPhase(${i})">
        <div class="wc-icon">${p.icon}</div>
        <div class="wc-name">${p.title}</div>
        <div class="wc-dur">${p.duration}</div>
      </div>`
    ).join('');

    main.innerHTML = `<div class="welcome">
      <div class="welcome-icon">🚀</div>
      <h2>DevOps გზამკვლევი</h2>
      <p>აირჩიე ფაზა მარცხენა პანელიდან. თითოეული ფაზა შეიცავს დეტალურ გაიდს კოდის მაგალითებით. მონიშნე შესრულებული skill-ები პროგრესის სანახავად.</p>
      <div class="welcome-grid">${cards}</div>
    </div>`;
    return;
  }

  const phase = phases[state.activePhase];
  const accentColors = ['var(--accent-green)','var(--accent-blue)','var(--accent-cyan)','var(--accent-orange)','var(--accent-purple)','var(--accent-red)'];
  const accent = accentColors[state.activePhase];

  let topicTabs = phase.topics.map((t, ti) =>
    `<button class="topic-tab ${state.activeTopic === ti ? 'active' : ''}"
      onclick="selectTopic(${ti})"
      ${state.activeTopic === ti ? `style="border-color:${accent};background:${accent}18;color:${accent}"` : ''}>
      ${t.name}
    </button>`
  ).join('');

  let content = '';

  if (state.activeTopic === null) {
    content = '<div class="topic-prompt">აირჩიე თემა ზემოდან</div>';
  } else {
    const topic = phase.topics[state.activeTopic];

    let detailTabs = topic.details.map((d, di) =>
      `<button class="detail-tab ${state.activeDetail === di ? 'active' : ''}" onclick="selectDetail(${di})">${d.title}</button>`
    ).join('');

    let terminalBlock = '';
    if (state.activeDetail !== null) {
      const detail = topic.details[state.activeDetail];
      terminalBlock = `<div class="terminal">
        <div class="terminal-bar">
          <div class="terminal-dot r"></div>
          <div class="terminal-dot y"></div>
          <div class="terminal-dot g"></div>
          <span class="terminal-title">${detail.title}</span>
        </div>
        <pre>${escapeHtml(detail.content)}</pre>
      </div>`;
    }

    content = `<div class="content-area">
      <div class="detail-tabs">${detailTabs}</div>
      ${terminalBlock}
    </div>`;
  }

  main.innerHTML = `
    <div class="phase-header">
      <div class="phase-header-top">
        <span class="ph-icon">${phase.icon}</span>
        <div>
          <h2>ფაზა ${phase.id}: ${phase.title}</h2>
          <p>${phase.description}</p>
        </div>
      </div>
      <div class="topic-tabs">${topicTabs}</div>
    </div>
    ${content}`;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── ACTIONS ───
function selectPhase(i) {
  state.activePhase = i;
  state.activeTopic = null;
  state.activeDetail = null;
  render();
}

function selectTopic(i) {
  state.activeTopic = i;
  state.activeDetail = null;
  render();
}

function selectDetail(i) {
  state.activeDetail = i;
  render();
}

function toggleSkill(skill) {
  if (state.completed.has(skill)) state.completed.delete(skill);
  else state.completed.add(skill);
  saveCompleted();
  render();
}

function saveCompleted() {
  localStorage.setItem('devops_completed', JSON.stringify([...state.completed]));
}

function loadCompleted() {
  try {
    const saved = localStorage.getItem('devops_completed');
    if (saved) state.completed = new Set(JSON.parse(saved));
  } catch (e) {}
}

function render() {
  updateProgress();
  renderSidebar();
  renderMain();
}

// ─── INIT ───
loadCompleted();
render();
</script>
</body>
</html>
